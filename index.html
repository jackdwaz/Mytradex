<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Trading Dashboard</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body { background:#0d1117; color:#fff; font-family:sans-serif; margin:0; }
.container { max-width:420px; margin:auto; padding:10px; }
.card { background:#161b22; padding:12px; border-radius:10px; margin-bottom:10px; }
input,select,button {
    width:100%; padding:10px; margin:5px 0;
    border:none; border-radius:8px; background:#0d1117; color:#fff;
}
button { background:#238636; }
.buy{color:#00ff9f;} .sell{color:#ff4d4d;}
.warn{color:#ffaa00;}
#chart { height:300px; }
</style>
</head>

<body>
<div class="container">

<h2>🚀 Pro Trading Dashboard</h2>

<div class="card">
<input id="symbolInput" placeholder="BTCUSDT / ETHUSDT">
<button onclick="init()">Load</button>
</div>

<div id="chart"></div>

<div class="card">📡 Price: <span id="price">-</span></div>

<div class="card">
<h3>🤖 Auto Signal</h3>
<div id="autoSignal">Waiting...</div>
</div>

<div class="card">
<h3>📊 Order Book</h3>
<div id="orderbook">-</div>
</div>

<button onclick="refresh()">🔄 Refresh</button>

</div>

<script>

let symbol="BTCUSDT";
let ws;

// ================= INIT =================
function init(){
 symbol=document.getElementById("symbolInput").value.toUpperCase()||"BTCUSDT";

 document.getElementById("chart").innerHTML="";

 new TradingView.widget({
  container_id:"chart",
  symbol:"BINANCE:"+symbol,
  interval:"15",
  theme:"dark",
  width:"100%",
  height:300
 });

 startWS();
 fetchOrderBook();
 loadData();
 setInterval(loadData,5000);
}

// ================= WEBSOCKET =================
function startWS(){
 if(ws) ws.close();

 ws=new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@trade`);

 ws.onmessage=e=>{
  let d=JSON.parse(e.data);
  price.innerText=parseFloat(d.p).toFixed(2);
 };
}

// ================= ORDER BOOK =================
async function fetchOrderBook(){
 let res=await fetch(`https://api.binance.com/api/v3/depth?symbol=${symbol}&limit=5`);
 let d=await res.json();
 orderbook.innerHTML=`Bid: ${d.bids[0][0]} | Ask: ${d.asks[0][0]}`;
}

// ================= CANDLES =================
async function getCandles(tf){
 let res=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=100`);
 let d=await res.json();
 return d.map(x=>({
  open:+x[1], high:+x[2], low:+x[3], close:+x[4], volume:+x[5]
 }));
}

// ================= INDICATORS =================
function ema(arr,p){
 let k=2/(p+1),e=arr[0];
 for(let i=1;i<arr.length;i++){e=arr[i]*k+e*(1-k)}
 return e;
}

function rsi(arr){
 let g=0,l=0;
 for(let i=1;i<arr.length;i++){
  let d=arr[i]-arr[i-1];
  if(d>0)g+=d; else l-=d;
 }
 let rs=g/(l||1);
 return 100-(100/(1+rs));
}

// ================= ENGINE =================
async function loadData(){

 let c5 = await getCandles("5m");
 let c15 = await getCandles("15m");
 let c1h = await getCandles("1h");

 let close5 = c5.map(c=>c.close);
 let vol5 = c5.map(c=>c.volume);

 let ema5 = ema(close5.slice(-30),9);
 let ema5s = ema(close5.slice(-30),21);

 let ema15 = ema(c15.map(c=>c.close).slice(-30),9);
 let ema1h = ema(c1h.map(c=>c.close).slice(-30),9);

 let rsi5 = rsi(close5.slice(-14));

 let last=c5[c5.length-1];
 let prev=c5[c5.length-2];

 let signal="NO TRADE",cls="",msg="";
 let score=0;

// ===== NO TRADE ZONE =====
if(rsi5>45 && rsi5<55){
 autoSignal.innerHTML=`<span class="warn">NO TRADE (Sideways Market)</span>`;
 return;
}

// ===== VOLUME =====
let avgVol = vol5.slice(-10).reduce((a,b)=>a+b,0)/10;
let volSpike = last.volume > avgVol;

// ===== LIQUIDITY SWEEP =====
let liquiditySweep = last.high > prev.high && last.close < prev.high;

// ===== TREND =====
if(ema5>ema5s){score+=20;}
if(ema15>ema5s){score+=20;}
if(ema1h>ema5s){score+=20;}

// ===== BREAKOUT =====
if(last.close>prev.high){score+=20;}
if(last.close<prev.low){score+=20;}

// ===== RSI =====
if(rsi5>60||rsi5<40){score+=10;}

// ===== VOLUME =====
if(volSpike){score+=10;}

// ===== FINAL SIGNAL =====
if(score>70){
 signal = last.close>prev.high ? "BUY" : "SELL";
 cls = signal==="BUY"?"buy":"sell";
}

// ENTRY / SL / TP
let entry=last.close;
let sl = signal==="BUY"?prev.low:prev.high;
let tp = signal==="BUY"?entry+(entry-sl)*2:entry-(sl-entry)*2;

// HOLD
let range=last.high-last.low;
let hold = range>50?"5–15 min":range>20?"15–60 min":"1–3 hr";

autoSignal.innerHTML=`
<span class="${cls}">${signal}</span><br>
Entry: ${entry.toFixed(2)}<br>
SL: ${sl.toFixed(2)}<br>
TP: ${tp.toFixed(2)}<br>
Hold: ${hold}<br>
Score: ${score}/100<br>
${volSpike?"📊 Volume Spike<br>":""}
${liquiditySweep?"💧 Liquidity Sweep Detected<br>":""}
`;

}

// ================= REFRESH =================
function refresh(){
 location.reload();
}

init();

</script>

</body>
</html>
