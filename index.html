<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading AI 🤖 Multi Asset PRO</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body { background:#0d1117; color:#fff; font-family:sans-serif; margin:0; }
.container { max-width:420px; margin:auto; padding:10px; }
.card { background:#161b22; padding:12px; border-radius:10px; margin-bottom:10px; }
input,button {
 width:100%; padding:10px; margin:5px 0;
 border:none; border-radius:8px; background:#0d1117; color:#fff;
}
button { background:#238636; }
.buy{color:#00ff9f;} .sell{color:#ff4d4d;}
.warn{color:#ffaa00;} .ai{color:#00c3ff;}

.alertBox{
 position:fixed; bottom:20px; left:50%;
 transform:translateX(-50%);
 background:#00ff9f; color:#000;
 padding:12px 20px; border-radius:10px;
 font-weight:bold; z-index:9999;
}
</style>
</head>

<body>

<div class="container">

<h2>Trading AI 🤖 PRO</h2>

<div class="card">
<input id="symbolInput" placeholder="BTCUSDT / GOLD / OIL / AAPL">
<button onclick="init()">Load</button>
</div>

<div id="chart"></div>

<div class="card">📡 Price: <span id="price">-</span></div>

<div class="card"><h3>🤖 Auto Signal</h3><div id="autoSignal"></div></div>
<div class="card"><h3>🧠 MTF Trend</h3><div id="mtfSignal"></div></div>
<div class="card"><h3>🧠 AI Predictor</h3><div id="aiSignal"></div></div>
<div class="card"><h3>🎯 Sniper Entry</h3><div id="sniper"></div></div>
<div class="card"><h3>💧 Liquidity</h3><div id="liquidityBox"></div></div>
<div class="card"><h3>📈 Spot Holding AI</h3><div id="spotAI"></div></div>

<button onclick="refresh()">🔄 Refresh</button>

</div>

<script>

let symbol = localStorage.getItem("symbol") || "BTCUSDT";
let lastAlertSignal="";
let ws;

// ===== SYMBOL MAP =====
function getTVSymbol(sym){
 sym=sym.toUpperCase();

 if(sym.endsWith("USDT")) return "BINANCE:"+sym;
 if(sym==="GOLD"||sym==="XAUUSD") return "OANDA:XAUUSD";
 if(sym==="OIL") return "TVC:USOIL";

 return "NASDAQ:"+sym;
}

// ===== INIT =====
function init(){

 symbol=document.getElementById("symbolInput").value.toUpperCase()||symbol;
 localStorage.setItem("symbol",symbol);

 document.getElementById("chart").innerHTML="";

 new TradingView.widget({
  container_id:"chart",
  symbol:getTVSymbol(symbol),
  interval:"15",
  theme:"dark",
  width:"100%",
  height:300
 });

 loadData();
 setInterval(loadData,5000);
}

// ===== DATA FETCH UNIVERSAL =====
async function getData(interval){

 if(symbol.endsWith("USDT")){
  let map={ "5m":"5m","15m":"15m","1h":"1h","4h":"4h","1d":"1d" };
  let res=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${map[interval]}&limit=100`);
  let d=await res.json();
  return d.map(x=>({c:+x[4],h:+x[2],l:+x[3]}));
 }

 // YAHOO FINANCE (stocks, gold, oil)
 let map={
  "5m":"5m","15m":"15m","1h":"60m","4h":"60m","1d":"1d"
 };

 let yahooSymbol=symbol;

 if(symbol==="GOLD") yahooSymbol="GC=F";
 if(symbol==="OIL") yahooSymbol="CL=F";

 let url=`https://query1.finance.yahoo.com/v8/finance/chart/${yahooSymbol}?interval=${map[interval]}&range=5d`;

 let res=await fetch(url);
 let data=await res.json();

 let closes=data.chart.result[0].indicators.quote[0].close;
 let highs=data.chart.result[0].indicators.quote[0].high;
 let lows=data.chart.result[0].indicators.quote[0].low;

 return closes.map((c,i)=>({
  c:c||0,
  h:highs[i]||0,
  l:lows[i]||0
 }));
}

// EMA
function ema(a,p){
 let k=2/(p+1),e=a[0];
 for(let i=1;i<a.length;i++){e=a[i]*k+e*(1-k)}
 return e;
}

// ALERT
function showAlert(msg){
 let box=document.createElement("div");
 box.className="alertBox";
 box.innerText=msg;
 document.body.appendChild(box);
 setTimeout(()=>box.remove(),3000);
}

// ===== MAIN =====
async function loadData(){

let c5=await getData("5m");
let c15=await getData("15m");
let c1h=await getData("1h");
let c4h=await getData("4h");
let c1d=await getData("1d");

let close5=c5.map(x=>x.c);
let last=c5[c5.length-1];
let prev=c5[c5.length-2];

let ema9=ema(close5.slice(-30),9);
let ema21=ema(close5.slice(-30),21);

let move=Math.abs(last.c-prev.l)/last.c;

// ===== AUTO SIGNAL =====
let signal="NO TRADE",cls="";
if(move>0.003 && ema9>ema21 && last.c>prev.h){signal="BUY";cls="buy";}
if(move>0.003 && ema9<ema21 && last.c<prev.l){signal="SELL";cls="sell";}

let entry=last.c;
let sl=signal==="BUY"?entry*0.99:entry*1.01;
let tp=signal==="BUY"?entry*1.03:entry*0.97;

autoSignal.innerHTML=`
<span class="${cls}">${signal}</span><br>
Entry: ${entry.toFixed(4)}<br>
SL: ${sl.toFixed(4)}<br>
TP: ${tp.toFixed(4)}
`;

// ===== MTF =====
function trend(arr){
 return ema(arr.map(x=>x.c).slice(-30),9)>ema(arr.map(x=>x.c).slice(-30),21);
}

let t15=trend(c15),t1h=trend(c1h),t4h=trend(c4h),t1d=trend(c1d);

mtfSignal.innerHTML=`
15m: ${t15?"🟢":"🔴"}<br>
1H: ${t1h?"🟢":"🔴"}<br>
4H: ${t4h?"🟢":"🔴"}<br>
1D: ${t1d?"🟢":"🔴"}
`;

// ===== AI =====
let ai=0;
if(t15)ai+=15;if(t1h)ai+=25;if(t4h)ai+=30;if(t1d)ai+=30;
if(signal!=="NO TRADE")ai+=10;

let advice=ai>75?"ENTER":ai>60?"GOOD":ai>40?"WEAK":"AVOID";

aiSignal.innerHTML=`Confidence: ${ai}%<br>${advice}`;

// ===== SNIPER =====
let body=Math.abs(last.c-last.l);
let range=last.h-last.l;
let sniperReady=(body/range)>0.6 && move>0.004;

sniper.innerHTML=sniperReady?"🎯 READY":"⏳ WAIT";

// ===== LIQUIDITY =====
let stopHunt=last.h>prev.h && last.c<prev.h;
liquidityBox.innerHTML=stopHunt?"⚠️ STOP HUNT":"Clean Move";

// ===== SPOT HOLD =====
let holdScore=(t15?1:0)+(t1h?2:0)+(t4h?3:0)+(t1d?4:0);

let holdText="Avoid";
if(holdScore>=7) holdText="Best: 4H → 1D+";
else if(holdScore>=4) holdText="Good: 1H → 4H";
else if(holdScore>=2) holdText="Short: 15m → 1H";

spotAI.innerHTML=holdText;

// ===== ALERT =====
let currentSignal=signal+"_"+advice;

if(ai>80 && sniperReady && currentSignal!==lastAlertSignal){
 lastAlertSignal=currentSignal;
 showAlert("🚀 High Probability Trade");
}

}

// REFRESH
function refresh(){location.reload();}
init();

</script>
</body>
</html>
