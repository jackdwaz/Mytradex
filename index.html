<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading System FIXED</title>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

<style>
body { background:#0d1117; color:#fff; font-family:sans-serif; margin:0; }
.container { max-width:420px; margin:auto; padding:10px; }
.card { background:#161b22; padding:12px; border-radius:10px; margin-bottom:10px; }
input,button {
    width:100%; padding:10px; margin:5px 0;
    border:none; border-radius:8px; background:#0d1117; color:#fff;
}
button { background:#238636; }
.buy{color:#00ff9f;} .sell{color:#ff4d4d;}
.warn{color:#ffaa00;}
#chart { height:300px; }
</style>
</head>

<body>

<div class="container">

<h2>🚀 Trading System</h2>

<div class="card">
<input id="symbolInput" placeholder="BTCUSDT">
<button onclick="init()">Load</button>
</div>

<div id="chart"></div>

<div class="card">📡 Price: <span id="price">-</span></div>

<div class="card">
<h3>🎯 Precision Signal</h3>
<div id="precision">Waiting...</div>
</div>

<div class="card">
<h3>🧠 Trend</h3>
<div id="trend">Waiting...</div>
</div>

<div class="card">
<h3>⚡ Decision</h3>
<div id="decision">Waiting...</div>
</div>

<button onclick="refresh()">🔄 Refresh</button>

</div>

<script>

let chart, candleSeries;
let entryLine, slLine, tpLine;
let symbol="BTCUSDT";
let ws;

// INIT
function init(){
 symbol=document.getElementById("symbolInput").value.toUpperCase()||"BTCUSDT";

 document.getElementById("chart").innerHTML="";

 chart = LightweightCharts.createChart(document.getElementById("chart"), {
  width:380,
  height:300,
  layout:{background:{color:"#0d1117"},textColor:"#fff"}
 });

 candleSeries = chart.addCandlestickSeries();

 startWS();
 loadData();
 setInterval(loadData,5000);
}

// WS PRICE
function startWS(){
 if(ws) ws.close();

 ws=new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@trade`);

 ws.onmessage=e=>{
  let d=JSON.parse(e.data);
  price.innerText=parseFloat(d.p).toFixed(2);
 };
}

// FETCH
async function getCandles(tf){
 let res=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=100`);
 let d=await res.json();

 return d.map(x=>({
  time:x[0]/1000,
  open:+x[1],
  high:+x[2],
  low:+x[3],
  close:+x[4],
  volume:+x[5]
 }));
}

// EMA
function ema(arr,p){
 let k=2/(p+1),e=arr[0];
 for(let i=1;i<arr.length;i++){e=arr[i]*k+e*(1-k)}
 return e;
}

// RSI
function rsi(arr){
 let g=0,l=0;
 for(let i=1;i<arr.length;i++){
  let d=arr[i]-arr[i-1];
  if(d>0)g+=d; else l-=d;
 }
 let rs=g/(l||1);
 return 100-(100/(1+rs));
}

// MAIN
async function loadData(){

 let c5=await getCandles("5m");
 let c15=await getCandles("15m");
 let c1h=await getCandles("1h");
 let c4h=await getCandles("4h");
 let c1d=await getCandles("1d");

 candleSeries.setData(c5);

// PRECISION
let close5=c5.map(c=>c.close);
let ema9=ema(close5.slice(-30),9);
let ema21=ema(close5.slice(-30),21);
let rsi5=rsi(close5.slice(-14));

let last=c5[c5.length-1];
let prev=c5[c5.length-2];

let precisionSignal="NO TRADE", cls="";
let valid=true;

let move=Math.abs(last.close-prev.low)/last.close;

if(move<0.002 || (rsi5>45 && rsi5<55)){
 precision.innerHTML=`<span class="warn">NO TRADE</span>`;
 valid=false;
}

let isBuy=ema9>ema21 && last.close>prev.high;
let isSell=ema9<ema21 && last.close<prev.low;

if(valid){
 if(isBuy){precisionSignal="BUY"; cls="buy";}
 if(isSell){precisionSignal="SELL"; cls="sell";}
}

let entry=last.close;
let sl=isBuy?entry*0.99:entry*1.01;
let tp=isBuy?entry*1.02:entry*0.98;

precision.innerHTML=`
<span class="${cls}">${precisionSignal}</span><br>
Entry: ${entry.toFixed(4)}<br>
SL: ${sl.toFixed(4)}<br>
TP: ${tp.toFixed(4)}
`;

// DRAW LINES
if(entryLine) candleSeries.removePriceLine(entryLine);
if(slLine) candleSeries.removePriceLine(slLine);
if(tpLine) candleSeries.removePriceLine(tpLine);

if(precisionSignal!=="NO TRADE"){
 entryLine=candleSeries.createPriceLine({price:entry,color:"#00ff9f"});
 slLine=candleSeries.createPriceLine({price:sl,color:"#ff4d4d"});
 tpLine=candleSeries.createPriceLine({price:tp,color:"#4da6ff"});
}

// TREND
function trend(arr){
 let closes=arr.map(c=>c.close);
 return ema(closes.slice(-30),9)>ema(closes.slice(-30),21);
}

let t15=trend(c15), t1h=trend(c1h), t4h=trend(c4h), t1d=trend(c1d);

let trendType="MIXED";

if(t15&&t1h&&t4h&&t1d) trendType="STRONG BUY";
else if(!t15&&!t1h&&!t4h&&!t1d) trendType="STRONG SELL";
else if(t15&&t1h) trendType="SHORT TERM BUY";
else if(!t15&&!t1h) trendType="SHORT TERM SELL";

trend.innerHTML=trendType;

// FINAL
let final="NO TRADE";

if(precisionSignal==="BUY" && trendType.includes("BUY")) final="TAKE BUY";
else if(precisionSignal==="SELL" && trendType.includes("SELL")) final="TAKE SELL";
else if(precisionSignal!=="NO TRADE") final="SCALP ONLY";

decision.innerHTML=final;

}

function refresh(){
 location.reload();
}

init();

</script>
</body>
</html>
