<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro MTF Engine</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{background:#0d1117;color:#fff;font-family:sans-serif;margin:0}
.container{max-width:420px;margin:auto;padding:10px}
.card{background:#161b22;padding:12px;border-radius:10px;margin-bottom:10px}
input,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;background:#0d1117;color:#fff}
button{background:#238636}
.buy{color:#00ff9f}.sell{color:#ff4d4d}
</style>
</head>

<body>
<div class="container">

<h2>🚀 Pro MTF Engine</h2>

<div class="card">
<input id="symbol" placeholder="BTCUSDT">
<button onclick="init()">Load</button>
</div>

<div id="chart"></div>

<div class="card"><b>Price:</b> <span id="price">-</span></div>

<div class="card">
<h3>Signal</h3>
<div id="signal">Waiting...</div>
</div>

<button onclick="refresh()">🔄 Refresh</button>

</div>

<script>

let symbol="BTCUSDT";

// ================= INIT =================
function init(){
 symbol=document.getElementById("symbol").value.toUpperCase()||"BTCUSDT";

 document.getElementById("chart").innerHTML="";

 new TradingView.widget({
  container_id:"chart",
  symbol:"BINANCE:"+symbol,
  interval:"15",
  theme:"dark",
  width:"100%",
  height:280
 });

 loadData();
 setInterval(loadData,5000);
}

// ================= FETCH CANDLES =================
async function fetchCandles(interval){
 let res=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=100`);
 let data=await res.json();
 return data.map(d=>({
  open:parseFloat(d[1]),
  high:parseFloat(d[2]),
  low:parseFloat(d[3]),
  close:parseFloat(d[4])
 }));
}

// ================= EMA =================
function ema(arr,p){
 let k=2/(p+1),e=arr[0];
 for(let i=1;i<arr.length;i++){e=arr[i]*k+e*(1-k)}
 return e;
}

// ================= RSI =================
function rsi(arr){
 let g=0,l=0;
 for(let i=1;i<arr.length;i++){
  let d=arr[i]-arr[i-1];
  if(d>0) g+=d; else l-=d;
 }
 let rs=g/(l||1);
 return 100-100/(1+rs);
}

// ================= ANALYZE =================
async function loadData(){

 try{

 let c5 = await fetchCandles("5m");
 let c15 = await fetchCandles("15m");
 let c1h = await fetchCandles("1h");

 let close5 = c5.map(c=>c.close);
 let close15 = c15.map(c=>c.close);
 let close1h = c1h.map(c=>c.close);

 let ema5 = ema(close5.slice(-30),9);
 let ema5s = ema(close5.slice(-30),21);

 let ema15 = ema(close15.slice(-30),9);
 let ema15s = ema(close15.slice(-30),21);

 let ema1h = ema(close1h.slice(-30),9);
 let ema1hs = ema(close1h.slice(-30),21);

 let rsi5 = rsi(close5.slice(-14));

 let last5 = c5[c5.length-1];
 let prev5 = c5[c5.length-2];

 let signal="NO TRADE", cls="";

// ===== BUY =====
if(ema1h>ema1hs && ema15>ema15s && ema5>ema5s &&
   last5.close > prev5.high && rsi5>50){
 signal="BUY";
 cls="buy";
}

// ===== SELL =====
if(ema1h<ema1hs && ema15<ema15s && ema5<ema5s &&
   last5.close < prev5.low && rsi5<50){
 signal="SELL";
 cls="sell";
}

// ENTRY / SL / TP
let entry=last5.close;
let sl = signal==="BUY" ? prev5.low : prev5.high;
let tp = signal==="BUY" ? entry + (entry-sl)*2 : entry - (sl-entry)*2;

// HOLD TIME
let range=last5.high-last5.low;
let hold = range>50 ? "5–15 min" : range>20 ? "15–60 min" : "1–3 hr";

// CONFIDENCE
let conf = Math.min(90,
 Math.abs(ema1h-ema1hs)*10000 +
 Math.abs(ema15-ema15s)*5000 +
 (rsi5>50?10:5)
);

document.getElementById("signal").innerHTML=`
<span class="${cls}">${signal}</span><br>
Entry: ${entry.toFixed(2)}<br>
SL: ${sl.toFixed(2)}<br>
TP: ${tp.toFixed(2)}<br>
Hold: ${hold}<br>
Confidence: ${conf.toFixed(0)}%
`;

document.getElementById("price").innerText=entry.toFixed(2);

 }catch(e){
  document.getElementById("signal").innerText="API Error";
 }

}

// ================= REFRESH =================
function refresh(){
 location.reload();
}

init();

</script>
</body>
</html>
