<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Trading System PRO+</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body { background:#0d1117; color:#fff; font-family:sans-serif; margin:0; }
.container { max-width:420px; margin:auto; padding:10px; }
.card { background:#161b22; padding:12px; border-radius:10px; margin-bottom:10px; }
input,button {
    width:100%; padding:10px; margin:5px 0;
    border:none; border-radius:8px; background:#0d1117; color:#fff;
}
button { background:#238636; }
.buy{color:#00ff9f;} .sell{color:#ff4d4d;}
.warn{color:#ffaa00;}
#chart { height:300px; }
</style>
</head>

<body>

<div class="container">

<h2>🚀 Ultimate Trading System PRO+</h2>

<div class="card">
<input id="symbolInput" placeholder="BTCUSDT / ETHUSDT">
<button onclick="init()">Load</button>
</div>

<div id="chart"></div>

<div class="card">📡 Price: <span id="price">-</span></div>

<!-- AUTO SIGNAL -->
<div class="card">
<h3>🤖 Auto Signal</h3>
<div id="autoSignal">Waiting...</div>
</div>

<!-- MTF SIGNAL -->
<div class="card">
<h3>🧠 Market Direction (MTF)</h3>
<div id="mtfSignal">Waiting...</div>
</div>

<button onclick="refresh()">🔄 Refresh</button>

</div>

<script>

let symbol="BTCUSDT";
let ws;

// INIT
function init(){
 symbol=document.getElementById("symbolInput").value.toUpperCase()||"BTCUSDT";

 document.getElementById("chart").innerHTML="";

 new TradingView.widget({
  container_id:"chart",
  symbol:"BINANCE:"+symbol,
  interval:"15",
  theme:"dark",
  width:"100%",
  height:300
 });

 startWS();
 loadData();
 setInterval(loadData,5000);
}

// WS
function startWS(){
 if(ws) ws.close();

 ws=new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@trade`);

 ws.onmessage=e=>{
  let d=JSON.parse(e.data);
  price.innerText=parseFloat(d.p).toFixed(6);
 };
}

// FETCH
async function getCandles(tf){
 let res=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=100`);
 let d=await res.json();
 return d.map(x=>({
  close:+x[4], high:+x[2], low:+x[3], volume:+x[5]
 }));
}

// EMA
function ema(arr,p){
 let k=2/(p+1),e=arr[0];
 for(let i=1;i<arr.length;i++){e=arr[i]*k+e*(1-k)}
 return e;
}

// RSI
function rsi(arr){
 let g=0,l=0;
 for(let i=1;i<arr.length;i++){
  let d=arr[i]-arr[i-1];
  if(d>0)g+=d; else l-=d;
 }
 let rs=g/(l||1);
 return 100-(100/(1+rs));
}

// MAIN
async function loadData(){

 let c5 = await getCandles("5m");
 let c15 = await getCandles("15m");
 let c1h = await getCandles("1h");
 let c4h = await getCandles("4h");
 let c1d = await getCandles("1d");

 let close5 = c5.map(c=>c.close);
 let vol5 = c5.map(c=>c.volume);

 let ema9 = ema(close5.slice(-30),9);
 let ema21 = ema(close5.slice(-30),21);

 let rsi5 = rsi(close5.slice(-14));

 let last = c5[c5.length-1];
 let prev = c5[c5.length-2];

 let signal="NO TRADE", cls="", score=0;
 let valid=true;

// ===== FILTER =====
let move=Math.abs(last.close-prev.low)/last.close;

if(move<0.002 || (rsi5>45 && rsi5<55)){
 valid=false;
}

// ===== SCORE =====
if(ema9>ema21) score+=25;
if(last.close>prev.high) score+=25;
if(rsi5>55) score+=10;

// ===== SIGNAL =====
if(valid && score>=50){
 signal = last.close>prev.high ? "BUY" : "SELL";
 cls = signal==="BUY"?"buy":"sell";
}

// ===== TP/SL FIX =====
let entry=last.close;
let sl = signal==="BUY"? entry*0.99 : entry*1.01;
let tp = signal==="BUY"? entry*1.02 : entry*0.98;

// HOLD LOGIC
let hold="No Trade";
if(signal==="BUY" || signal==="SELL"){
 hold = move>0.01?"5–15 min":"15–60 min";
}

// OUTPUT AUTO
autoSignal.innerHTML=`
<span class="${cls}">${signal}</span><br>
Entry: ${entry.toFixed(6)}<br>
SL: ${sl.toFixed(6)}<br>
TP: ${tp.toFixed(6)}<br>
Hold: ${hold}<br>
Score: ${score}/100
`;

// ===== MTF LOGIC =====
function trend(arr){
 return ema(arr.map(c=>c.close).slice(-30),9) > ema(arr.map(c=>c.close).slice(-30),21);
}

let t15=trend(c15);
let t1h=trend(c1h);
let t4h=trend(c4h);
let t1d=trend(c1d);

let mtfType="NO TRADE", mtfHold="";

if(t15 && t1h && t4h && t1d){
 mtfType="STRONG BUY"; mtfHold="Hold: Hours → Days";
}
else if(!t15 && !t1h && !t4h && !t1d){
 mtfType="STRONG SELL"; mtfHold="Hold: Hours → Days";
}
else if(t15 && t1h){
 mtfType="SHORT TERM BUY"; mtfHold="Hold: 5–60 min";
}
else if(!t15 && !t1h){
 mtfType="SHORT TERM SELL"; mtfHold="Hold: 5–60 min";
}
else{
 mtfType="MIXED"; mtfHold="Avoid Trade";
}

// OUTPUT MTF
mtfSignal.innerHTML=`
${t15?"🟢":"🔴"} 15m  
${t1h?"🟢":"🔴"} 1H  
${t4h?"🟢":"🔴"} 4H  
${t1d?"🟢":"🔴"} 1D<br><br>

<b>${mtfType}</b><br>
${mtfHold}
`;

}

function refresh(){
 location.reload();
}

init();

</script>
</body>
</html>
