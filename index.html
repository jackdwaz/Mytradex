<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard PRO</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body { background:#0d1117; color:#fff; font-family:sans-serif; margin:0; }
.container { max-width:420px; margin:auto; padding:10px; }
.card { background:#161b22; padding:12px; border-radius:10px; margin-bottom:10px; }
input,button {
    width:100%; padding:10px; margin:5px 0;
    border:none; border-radius:8px; background:#0d1117; color:#fff;
}
button { background:#238636; }
.buy{color:#00ff9f;} .sell{color:#ff4d4d;}
.warn{color:#ffaa00;}
#chart { height:300px; }
</style>
</head>

<body>

<div class="container">

<h2>🚀 Trading Dashboard PRO</h2>

<div class="card">
<input id="symbolInput" placeholder="BTCUSDT / SHIBUSDT">
<button onclick="init()">Load</button>
</div>

<div id="chart"></div>

<div class="card">📡 Price: <span id="price">-</span></div>

<div class="card">
<h3>🤖 Auto Signal</h3>
<div id="autoSignal">Waiting...</div>
</div>

<div class="card">
<h3>📊 Order Book</h3>
<div id="orderbook">-</div>
</div>

<button onclick="refresh()">🔄 Refresh</button>

</div>

<script>

let symbol="BTCUSDT";
let ws;

function init(){
 symbol=document.getElementById("symbolInput").value.toUpperCase()||"BTCUSDT";

 document.getElementById("chart").innerHTML="";

 new TradingView.widget({
  container_id:"chart",
  symbol:"BINANCE:"+symbol,
  interval:"15",
  theme:"dark",
  width:"100%",
  height:300
 });

 startWS();
 fetchOrderBook();
 loadData();
 setInterval(loadData,5000);
}

// ================= WEBSOCKET =================
function startWS(){
 if(ws) ws.close();

 ws=new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@trade`);

 ws.onmessage=e=>{
  let d=JSON.parse(e.data);
  price.innerText=parseFloat(d.p);
 };
}

// ================= ORDER BOOK =================
async function fetchOrderBook(){
 let res=await fetch(`https://api.binance.com/api/v3/depth?symbol=${symbol}&limit=5`);
 let d=await res.json();
 orderbook.innerHTML=`Bid: ${d.bids[0][0]} | Ask: ${d.asks[0][0]}`;
}

// ================= FETCH =================
async function getCandles(tf){
 let res=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=100`);
 let d=await res.json();
 return d.map(x=>({
  open:+x[1], high:+x[2], low:+x[3], close:+x[4], volume:+x[5]
 }));
}

// ================= INDICATORS =================
function ema(arr,p){
 let k=2/(p+1),e=arr[0];
 for(let i=1;i<arr.length;i++){e=arr[i]*k+e*(1-k)}
 return e;
}

function rsi(arr){
 let g=0,l=0;
 for(let i=1;i<arr.length;i++){
  let d=arr[i]-arr[i-1];
  if(d>0)g+=d; else l-=d;
 }
 let rs=g/(l||1);
 return 100-(100/(1+rs));
}

// ================= ENGINE =================
async function loadData(){

 let c5 = await getCandles("5m");
 let close5 = c5.map(c=>c.close);
 let vol5 = c5.map(c=>c.volume);

 let ema9 = ema(close5.slice(-30),9);
 let ema21 = ema(close5.slice(-30),21);

 let rsi5 = rsi(close5.slice(-14));

 let last=c5[c5.length-1];
 let prev=c5[c5.length-2];

// NO TRADE
if(rsi5>45 && rsi5<55){
 autoSignal.innerHTML=`<span class="warn">NO TRADE (Sideways)</span>`;
 return;
}

// DISTANCE
let move = Math.abs(last.close - prev.low);
let percentMove = move / last.close;

// FILTER SMALL MOVES
if(percentMove < 0.002){
 autoSignal.innerHTML=`<span class="warn">NO TRADE (Low Movement)</span>`;
 return;
}

// SIGNAL
let isBuy = ema9 > ema21 && last.close > prev.high;
let isSell = ema9 < ema21 && last.close < prev.low;

if(!isBuy && !isSell){
 autoSignal.innerHTML=`NO TRADE`;
 return;
}

// ENTRY
let entry = last.close;

// SL (1% minimum)
let sl = isBuy ? entry * 0.99 : entry * 1.01;

// TP (2%)
let tp = isBuy ? entry * 1.02 : entry * 0.98;

// HOLD
let hold = percentMove > 0.01 ? "5–15 min" : "15–60 min";

// OUTPUT
autoSignal.innerHTML=`
<span class="${isBuy?"buy":"sell"}">${isBuy?"BUY":"SELL"}</span><br>
Entry: ${entry.toFixed(6)}<br>
SL: ${sl.toFixed(6)}<br>
TP: ${tp.toFixed(6)}<br>
Hold: ${hold}<br>
RR: 1:2
`;

}

// ================= REFRESH =================
function refresh(){
 location.reload();
}

init();

</script>
</body>
</html>
