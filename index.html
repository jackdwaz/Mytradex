<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Trading System</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body { background:#0d1117; color:#fff; font-family:sans-serif; margin:0; }
.container { max-width:420px; margin:auto; padding:10px; }
.card { background:#161b22; padding:12px; border-radius:10px; margin-bottom:10px; }
input,button {
    width:100%; padding:10px; margin:5px 0;
    border:none; border-radius:8px; background:#0d1117; color:#fff;
}
button { background:#238636; }
.buy{color:#00ff9f;} .sell{color:#ff4d4d;}
.warn{color:#ffaa00;}
</style>
</head>

<body>

<div class="container">

<h2>🚀 Smart Trading System</h2>

<div class="card">
<input id="symbolInput" placeholder="BTCUSDT / SHIBUSDT">
<button onclick="init()">Load</button>
</div>

<div id="chart"></div>

<div class="card">📡 Price: <span id="price">-</span></div>

<div class="card">
<h3>🧠 Smart Signal</h3>
<div id="signal">Waiting...</div>
</div>

<button onclick="refresh()">🔄 Refresh</button>

</div>

<script>

let symbol="BTCUSDT";
let ws;

function init(){
 symbol=document.getElementById("symbolInput").value.toUpperCase()||"BTCUSDT";

 document.getElementById("chart").innerHTML="";

 new TradingView.widget({
  container_id:"chart",
  symbol:"BINANCE:"+symbol,
  interval:"15",
  theme:"dark",
  width:"100%",
  height:300
 });

 startWS();
 loadData();
 setInterval(loadData,5000);
}

// ================= WS =================
function startWS(){
 if(ws) ws.close();

 ws=new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@trade`);

 ws.onmessage=e=>{
  let d=JSON.parse(e.data);
  price.innerText=parseFloat(d.p);
 };
}

// ================= FETCH =================
async function getCandles(tf){
 let res=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=100`);
 let d=await res.json();
 return d.map(x=>({
  high:+x[2], low:+x[3], close:+x[4]
 }));
}

// ================= EMA =================
function ema(arr,p){
 let k=2/(p+1),e=arr[0];
 for(let i=1;i<arr.length;i++){e=arr[i]*k+e*(1-k)}
 return e;
}

// ================= ANALYSIS =================
async function loadData(){

 let tf15 = await getCandles("15m");
 let tf1h = await getCandles("1h");
 let tf4h = await getCandles("4h");
 let tf1d = await getCandles("1d");

 let close15 = tf15.map(c=>c.close);
 let close1h = tf1h.map(c=>c.close);
 let close4h = tf4h.map(c=>c.close);
 let close1d = tf1d.map(c=>c.close);

// TREND COLORS
function trend(arr){
 return ema(arr.slice(-30),9) > ema(arr.slice(-30),21);
}

let t15 = trend(close15);
let t1h = trend(close1h);
let t4h = trend(close4h);
let t1d = trend(close1d);

// SIGNAL TYPE
let type="NO TRADE", cls="", hold="";

if(t15 && t1h && t4h && t1d){
 type="STRONG BUY"; cls="buy"; hold="Hours → Days";
}
else if(!t15 && !t1h && !t4h && !t1d){
 type="STRONG SELL"; cls="sell"; hold="Hours → Days";
}
else if(t15 && t1h){
 type="SHORT TERM BUY"; cls="buy"; hold="5–60 min";
}
else if(!t15 && !t1h){
 type="SHORT TERM SELL"; cls="sell"; hold="5–60 min";
}

// ENTRY ZONE
let last = tf15[tf15.length-1];
let prev = tf15[tf15.length-2];

let entryLow = prev.low;
let entryHigh = prev.high;

// OUTPUT
signal.innerHTML=`
<span class="${cls}">${type}</span><br><br>

15m: ${t15?"🟢":"🔴"}  
1H: ${t1h?"🟢":"🔴"}  
4H: ${t4h?"🟢":"🔴"}  
1D: ${t1d?"🟢":"🔴"}<br><br>

Entry Zone: ${entryLow.toFixed(6)} – ${entryHigh.toFixed(6)}<br>
Hold: ${hold}
`;

}

// ================= REFRESH =================
function refresh(){
 location.reload();
}

init();

</script>

</body>
</html>
