<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading System with Chart Signals</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body { background:#0d1117; color:#fff; font-family:sans-serif; margin:0; }
.container { max-width:420px; margin:auto; padding:10px; }
.card { background:#161b22; padding:12px; border-radius:10px; margin-bottom:10px; }
input,button {
    width:100%; padding:10px; margin:5px 0;
    border:none; border-radius:8px; background:#0d1117; color:#fff;
}
button { background:#238636; }
.buy{color:#00ff9f;} .sell{color:#ff4d4d;}
.warn{color:#ffaa00;}
#chart { height:300px; }
</style>
</head>

<body>

<div class="container">

<h2>🚀 Trading System (Visual Signals)</h2>

<div class="card">
<input id="symbolInput" placeholder="BTCUSDT">
<button onclick="init()">Load</button>
</div>

<div id="chart"></div>

<div class="card">
<h3>🎯 Signal</h3>
<div id="signal">Waiting...</div>
</div>

</div>

<script>

let symbol = "BTCUSDT";
let chart, candleSeries;
let entryLine, slLine, tpLine;

// ================= INIT =================
function init(){
 symbol = document.getElementById("symbolInput").value.toUpperCase() || "BTCUSDT";

 document.getElementById("chart").innerHTML="";

 chart = LightweightCharts.createChart(document.getElementById("chart"), {
  width: 380,
  height: 300,
  layout: { background:{color:"#0d1117"}, textColor:"#fff" },
  grid: { vertLines:{color:"#222"}, horzLines:{color:"#222"} }
 });

 candleSeries = chart.addCandlestickSeries();

 loadData();
 setInterval(loadData,5000);
}

// ================= FETCH =================
async function loadData(){

 let res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=5m&limit=100`);
 let data = await res.json();

 let candles = data.map(d=>({
  time: d[0]/1000,
  open: +d[1],
  high: +d[2],
  low: +d[3],
  close: +d[4]
 }));

 candleSeries.setData(candles);

 analyze(candles);
}

// ================= ANALYSIS =================
function analyze(candles){

 let last = candles[candles.length-1];
 let prev = candles[candles.length-2];

 let signal = "NO TRADE", cls="";

// SIMPLE LOGIC (you can replace with your engine)
if(last.close > prev.high){
 signal="BUY"; cls="buy";
}
else if(last.close < prev.low){
 signal="SELL"; cls="sell";
}

// ENTRY / SL / TP
let entry = last.close;
let sl = signal==="BUY" ? prev.low : prev.high;
let tp = signal==="BUY" ? entry + (entry-sl)*2 : entry - (sl-entry)*2;

// REMOVE OLD LINES
if(entryLine) chart.removePriceLine(entryLine);
if(slLine) chart.removePriceLine(slLine);
if(tpLine) chart.removePriceLine(tpLine);

// DRAW NEW LINES
if(signal!=="NO TRADE"){

 entryLine = candleSeries.createPriceLine({
  price: entry,
  color: "#00ff9f",
  lineWidth: 2,
  title: "ENTRY"
 });

 slLine = candleSeries.createPriceLine({
  price: sl,
  color: "#ff4d4d",
  lineWidth: 2,
  title: "SL"
 });

 tpLine = candleSeries.createPriceLine({
  price: tp,
  color: "#4da6ff",
  lineWidth: 2,
  title: "TP"
 });

}

// OUTPUT
document.getElementById("signal").innerHTML = `
<span class="${cls}">${signal}</span><br>
Entry: ${entry.toFixed(2)}<br>
SL: ${sl.toFixed(2)}<br>
TP: ${tp.toFixed(2)}
`;

}

init();

</script>

</body>
</html>
