<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading AI 🤖 Multi Asset</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body { background:#0d1117; color:#fff; font-family:sans-serif; margin:0; }
.container { max-width:420px; margin:auto; padding:10px; }
.card { background:#161b22; padding:12px; border-radius:10px; margin-bottom:10px; }
input,button {
 width:100%; padding:10px; margin:5px 0;
 border:none; border-radius:8px; background:#0d1117; color:#fff;
}
button { background:#238636; }
.buy{color:#00ff9f;} .sell{color:#ff4d4d;}
.warn{color:#ffaa00;} .ai{color:#00c3ff;}
.alertBox{
 position:fixed; bottom:20px; left:50%;
 transform:translateX(-50%);
 background:#00ff9f; color:#000;
 padding:12px 20px; border-radius:10px;
 font-weight:bold; z-index:9999;
}
</style>
</head>

<body>

<div class="container">

<h2>Trading AI 🤖 Multi Asset</h2>

<div class="card">
<input id="symbolInput" placeholder="BTCUSDT / GOLD / OIL / AAPL">
<button onclick="init()">Load</button>
</div>

<div id="chart"></div>
<div class="card">📡 Price: <span id="price">-</span></div>

<div class="card"><h3>🤖 Auto Signal</h3><div id="autoSignal"></div></div>
<div class="card"><h3>🧠 MTF Trend</h3><div id="mtfSignal"></div></div>
<div class="card"><h3>🧠 AI Predictor</h3><div id="aiSignal"></div></div>

</div>

<script>

let symbol = localStorage.getItem("symbol") || "BTCUSDT";
let ws;
let lastAlertSignal="";

// ===== SYMBOL MAPPING =====
function getTVSymbol(sym){

 if(sym.endsWith("USDT")) return "BINANCE:"+sym;

 if(sym==="GOLD" || sym==="XAUUSD") return "OANDA:XAUUSD";
 if(sym==="OIL") return "TVC:USOIL";

 // default stock
 return "NASDAQ:"+sym;
}

// ===== INIT =====
function init(){

 symbol=document.getElementById("symbolInput").value.toUpperCase()||symbol;
 localStorage.setItem("symbol",symbol);

 document.getElementById("chart").innerHTML="";

 new TradingView.widget({
  container_id:"chart",
  symbol:getTVSymbol(symbol),
  interval:"15",
  theme:"dark",
  width:"100%",
  height:300
 });

 // Only crypto gets live + AI
 if(symbol.endsWith("USDT")){
  startWS();
  loadData();
  setInterval(loadData,5000);
 } else {
  price.innerText="N/A";
  autoSignal.innerHTML="<span class='warn'>Not supported for this asset</span>";
  mtfSignal.innerHTML="-";
  aiSignal.innerHTML="-";
 }
}

// ===== WS (CRYPTO ONLY) =====
function startWS(){
 if(ws) ws.close();

 ws=new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@trade`);

 ws.onmessage=e=>{
  let d=JSON.parse(e.data);
  price.innerText=parseFloat(d.p).toFixed(6);
 };
}

// ===== FETCH =====
async function get(tf){
 let r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=100`);
 let d=await r.json();
 return d.map(x=>({c:+x[4],h:+x[2],l:+x[3]}));
}

// EMA
function ema(a,p){
 let k=2/(p+1),e=a[0];
 for(let i=1;i<a.length;i++){e=a[i]*k+e*(1-k)}
 return e;
}

// ALERT
function showAlert(msg){
 let box=document.createElement("div");
 box.className="alertBox";
 box.innerText=msg;
 document.body.appendChild(box);
 setTimeout(()=>box.remove(),3000);
}

// ===== MAIN (CRYPTO ONLY) =====
async function loadData(){

let c5=await get("5m");
let c15=await get("15m");
let c1h=await get("1h");
let c4h=await get("4h");
let c1d=await get("1d");

let close5=c5.map(x=>x.c);
let last=c5[c5.length-1];
let prev=c5[c5.length-2];

let ema9=ema(close5.slice(-30),9);
let ema21=ema(close5.slice(-30),21);

let move=Math.abs(last.c-prev.l)/last.c;

// AUTO
let signal="NO TRADE",cls="";
if(move>0.003 && ema9>ema21 && last.c>prev.h){signal="BUY";cls="buy";}
if(move>0.003 && ema9<ema21 && last.c<prev.l){signal="SELL";cls="sell";}

autoSignal.innerHTML=`<span class="${cls}">${signal}</span>`;

// MTF
function trend(arr){
 return ema(arr.map(x=>x.c).slice(-30),9)>ema(arr.map(x=>x.c).slice(-30),21);
}

let t15=trend(c15),t1h=trend(c1h),t4h=trend(c4h),t1d=trend(c1d);

mtfSignal.innerHTML=`15m:${t15?"🟢":"🔴"} 1H:${t1h?"🟢":"🔴"} 4H:${t4h?"🟢":"🔴"} 1D:${t1d?"🟢":"🔴"}`;

// AI
let ai=0;
if(t15)ai+=15;if(t1h)ai+=25;if(t4h)ai+=30;if(t1d)ai+=30;
if(signal!=="NO TRADE")ai+=10;

let advice=ai>75?"ENTER":"WAIT";

aiSignal.innerHTML=`Confidence: ${ai}% | ${advice}`;

// ALERT
let currentSignal=signal+"_"+advice;

if(ai>80 && currentSignal!==lastAlertSignal){
 lastAlertSignal=currentSignal;
 showAlert("🚀 High Probability Trade");
}

}

init();

</script>
</body>
</html>
