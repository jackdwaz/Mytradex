<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading AI 🤖</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body { background:#0d1117; color:#fff; font-family:sans-serif; margin:0; }
.container { max-width:420px; margin:auto; padding:10px; }
.card { background:#161b22; padding:12px; border-radius:10px; margin-bottom:10px; }
input,button {
    width:100%; padding:10px; margin:5px 0;
    border:none; border-radius:8px; background:#0d1117; color:#fff;
}
button { background:#238636; }
.buy{color:#00ff9f;} .sell{color:#ff4d4d;}
.warn{color:#ffaa00;} .ai{color:#00c3ff;}
#chart { height:300px; }
</style>
</head>

<body>

<div class="container">

<h2>Trading AI 🤖</h2>

<div class="card">
<input id="symbolInput" placeholder="BTCUSDT / ETHUSDT">
<button onclick="init()">Load</button>
</div>

<div id="chart"></div>

<div class="card">📡 Price: <span id="price">-</span></div>

<div class="card"><h3>🤖 Auto Signal</h3><div id="autoSignal"></div></div>
<div class="card"><h3>🧠 MTF Trend</h3><div id="mtfSignal"></div></div>
<div class="card"><h3>🧠 AI Predictor</h3><div id="aiSignal"></div></div>
<div class="card"><h3>🎯 Sniper Entry</h3><div id="sniper"></div></div>
<div class="card"><h3>💧 Liquidity</h3><div id="liquidityBox"></div></div>
<div class="card"><h3>📈 Spot Holding AI</h3><div id="spotAI"></div></div>

<button onclick="refresh()">🔄 Refresh</button>

</div>

<script>

let symbol = localStorage.getItem("symbol") || "BTCUSDT";
let ws;

// INIT
function init(){
 symbol=document.getElementById("symbolInput").value.toUpperCase()||symbol;
 localStorage.setItem("symbol",symbol);

 document.getElementById("chart").innerHTML="";
 new TradingView.widget({
  container_id:"chart",
  symbol:"BINANCE:"+symbol,
  interval:"15",
  theme:"dark",
  width:"100%",
  height:300
 });

 startWS();
 loadData();
 setInterval(loadData,5000);
}

// WS
function startWS(){
 if(ws) ws.close();
 ws=new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@trade`);
 ws.onmessage=e=>{
  let d=JSON.parse(e.data);
  price.innerText=parseFloat(d.p).toFixed(6);
 };
}

// FETCH
async function get(tf){
 let r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=100`);
 let d=await r.json();
 return d.map(x=>({c:+x[4],h:+x[2],l:+x[3],v:+x[5]}));
}

// EMA
function ema(a,p){
 let k=2/(p+1),e=a[0];
 for(let i=1;i<a.length;i++){e=a[i]*k+e*(1-k)}
 return e;
}

// MAIN
async function loadData(){

let c5=await get("5m");
let c15=await get("15m");
let c1h=await get("1h");
let c4h=await get("4h");
let c1d=await get("1d");

let close5=c5.map(x=>x.c);
let last=c5[c5.length-1];
let prev=c5[c5.length-2];

let ema9=ema(close5.slice(-30),9);
let ema21=ema(close5.slice(-30),21);

let move=Math.abs(last.c-prev.l)/last.c;

// ===== AUTO SIGNAL =====
let signal="NO TRADE",cls="";
if(move>0.003 && ema9>ema21 && last.c>prev.h){signal="BUY";cls="buy";}
if(move>0.003 && ema9<ema21 && last.c<prev.l){signal="SELL";cls="sell";}

let entry=last.c;
let sl=signal==="BUY"?entry*0.99:entry*1.01;
let tp=signal==="BUY"?entry*1.03:entry*0.97;

autoSignal.innerHTML=`
<span class="${cls}">${signal}</span><br>
Entry: ${entry.toFixed(6)}<br>
SL: ${sl.toFixed(6)}<br>
TP: ${tp.toFixed(6)}
`;

// ===== MTF =====
function trend(arr){
 return ema(arr.map(x=>x.c).slice(-30),9)>ema(arr.map(x=>x.c).slice(-30),21);
}

let t15=trend(c15),t1h=trend(c1h),t4h=trend(c4h),t1d=trend(c1d);

let mtfType = "MIXED";
let mtfAdvice = "Avoid Trade";

// Decision Logic
if(t15 && t1h && t4h && t1d){
 mtfType = "STRONG BUY";
 mtfAdvice = "Hold: Hours → Days";
}
else if(!t15 && !t1h && !t4h && !t1d){
 mtfType = "STRONG SELL";
 mtfAdvice = "Hold: Hours → Days";
}
else if(t15 && t1h){
 mtfType = "SHORT TERM BUY";
 mtfAdvice = "Hold: 5–60 min";
}
else if(!t15 && !t1h){
 mtfType = "SHORT TERM SELL";
 mtfAdvice = "Hold: 5–60 min";
}

// OUTPUT (CLEAN UI)
mtfSignal.innerHTML = `
<b>15m:</b> ${t15?"🟢":"🔴"}<br>
<b>1H:</b> ${t1h?"🟢":"🔴"}<br>
<b>4H:</b> ${t4h?"🟢":"🔴"}<br>
<b>1D:</b> ${t1d?"🟢":"🔴"}<br><br>

<b>${mtfType}</b><br>
${mtfAdvice}
`;
    

// ===== AI =====
let ai=0;
if(t15)ai+=15;if(t1h)ai+=25;if(t4h)ai+=30;if(t1d)ai+=30;
if(signal==="BUY"||signal==="SELL")ai+=10;

let advice=ai>75?"ENTER":ai>60?"GOOD":ai>40?"WEAK":"AVOID";

aiSignal.innerHTML=`
<span class="ai">Confidence: ${ai}%</span><br>
Advice: ${advice}
`;

// ===== SNIPER =====
let body=Math.abs(last.c-last.l);
let range=last.h-last.l;

let sniperReady = (body/range)>0.6 && move>0.004;

sniper.innerHTML=sniperReady?"🎯 READY":"⏳ WAIT";

// ===== LIQUIDITY =====
let stopHunt = last.h>prev.h && last.c<prev.h;
liquidityBox.innerHTML=stopHunt?"⚠️ STOP HUNT":"Clean Move";

// ===== SPOT HOLD AI =====
function strength(t){return t?1:0}

let holdScore = strength(t15)+strength(t1h)*2+strength(t4h)*3+strength(t1d)*4;

let holdText="Avoid";

if(holdScore>=7) holdText="Best: 4H → 1D+";
else if(holdScore>=4) holdText="Good: 1H → 4H";
else if(holdScore>=2) holdText="Short: 15m → 1H";

spotAI.innerHTML=holdText;

// ===== ALERT =====
if(ai>80 && sniperReady){
 alert("🚨 HIGH PROBABILITY TRADE");
}

}

function refresh(){location.reload();}

init();

</script>
</body>
</html>
